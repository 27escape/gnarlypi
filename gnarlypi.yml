name: gnarlypi

status:
  devices:
    - gnarly_status_pitft
    - gnarly_status_web
    # - gnarly_status_blinkt
    # - gnarly_status_ledshim
    # these should only be run via the console
    # - gnarly_status_curses
    # - gnarly_status_basic
  pitft:
    rotation: 0
    font_size: 24
    display_height: 240
    display_width: 240
    x_offset: 0
    y_offset: 80
    newline: 28

  # settings for the mini_pitft, copy these to the pitft section if needed
    # rotation: 270
    # font_size: 14
    # display_height: 135
    # display_width: 240
    # x_offset: 53
    # y_offset: 40
    # newline: 16

gnarlypi:
  store: "${HOME}/usb_data/"
  force: false
  logfile: "/tmp/gnarlypi.log"
  loglevel: "info"
  apps:
    - gnarly_indexer
    - gnarly_rsync
    - gnarly_web

indexer:
  files: "$(gnarlypi.store)/files"
  index: "$(gnarlypi.store)/index"
  
rsync:
  sleep: 300
  source: "$(indexer.index)"
  target: ${USER}@homeassistant:/forSamba/NVME
  complete_command: mosquitto_pub -h homeserver -t gnarlypi/rsync -m "complete"

status_web:
  port: 8027

